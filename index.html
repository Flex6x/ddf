<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>??? Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--sf:#10101c;--sf2:#181828;--bd:#252538;--ac:#e8c44a;--ac2:#b89530;--tx:#f0eee8;--mu:#6a6a8a;--mu2:#4a4a6a;--ck:#34d574;--r:18px;--rs:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:"DM Sans",sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(232,196,74,.07) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 85% 90%,rgba(80,60,180,.07) 0%,transparent 55%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:0 16px 100px}
.hdr{padding:44px 8px 20px;text-align:center}
.hdr-die{font-family:"Playfair Display",serif;font-size:13px;letter-spacing:.35em;color:var(--mu);text-transform:uppercase}
.hdr-qqq{font-family:"Playfair Display",serif;font-size:clamp(48px,14vw,64px);font-weight:900;color:var(--ac);line-height:.9;letter-spacing:-.03em;text-shadow:0 0 60px rgba(232,196,74,.25)}
.hdr-sub{font-size:12px;color:var(--mu2);letter-spacing:.12em;text-transform:uppercase;margin-top:8px}
.stats{display:flex;gap:1px;margin:0 0 24px;background:var(--bd);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.stat{flex:1;text-align:center;padding:14px 8px;background:var(--sf)}
.stat-n{font-family:"Playfair Display",serif;font-size:26px;font-weight:700;color:var(--ac);line-height:1}
.stat-l{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-top:3px}
.player{background:var(--sf);border:1px solid var(--bd);border-radius:22px;overflow:hidden;margin-bottom:28px}
.cvr{position:relative;width:100%;aspect-ratio:1;background:var(--sf2);overflow:hidden}
.cvr-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.cvr-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .45s}
.cvr-img.on{opacity:1}
.cvr-ok{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(52,213,116,.14);opacity:0;transition:opacity .3s;pointer-events:none}
.cvr-ok.on{opacity:1}
.cvr-ok svg{width:72px;height:72px;filter:drop-shadow(0 0 18px rgba(52,213,116,.7))}
.badge{position:absolute;top:14px;left:14px;background:rgba(8,8,16,.82);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:5px 11px;font-size:11px;font-weight:500;color:var(--mu);letter-spacing:.08em}
.spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .2s}
.spinner.on{opacity:1}
.spin-ring{width:36px;height:36px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pbody{padding:18px 22px 22px}
.pnum{font-size:11px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.ptitle{font-family:"Playfair Display",serif;font-size:clamp(18px,5vw,21px);font-weight:700;line-height:1.25;min-height:1.5em}
.prog{margin:14px 0 18px;display:flex;align-items:center;gap:10px}
.prog-track{flex:1;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--ac2),var(--ac));border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-pct{font-size:11px;color:var(--mu);min-width:30px;text-align:right}
.ctrl-row{display:flex;align-items:center;justify-content:center;gap:16px}
.ctrl{width:44px;height:44px;border-radius:50%;border:1px solid var(--bd);background:var(--sf2);color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
.ctrl:hover{border-color:var(--ac);color:var(--ac);transform:scale(1.07)}
.ctrl:active{transform:scale(.94)}
.ctrl:disabled{opacity:.22;pointer-events:none}
.check-btn{width:62px;height:62px;border-radius:50%;border:2px solid var(--bd);background:var(--sf2);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:all .3s cubic-bezier(.34,1.56,.64,1);flex-shrink:0}
.check-btn::before{content:"";position:absolute;inset:0;background:var(--ck);opacity:0;transition:opacity .25s}
.check-btn.on{border-color:var(--ck);box-shadow:0 0 22px rgba(52,213,116,.32);transform:scale(1.08)}
.check-btn.on::before{opacity:1}
.check-btn svg{position:relative;z-index:1;transition:color .2s}
.check-btn:not(.on) svg{color:var(--mu)}
.check-btn.on svg{color:#fff}
.lhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ltitle{font-family:"Playfair Display",serif;font-size:18px;font-weight:700}
.filters{display:flex;gap:5px}
.fb{padding:4px 11px;border-radius:20px;font-size:11px;font-family:"DM Sans",sans-serif;border:1px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;transition:all .15s;letter-spacing:.03em}
.fb.on{background:var(--ac);border-color:var(--ac);color:#000;font-weight:500}
.sw{margin-bottom:10px;position:relative}
.si{width:100%;padding:10px 14px 10px 36px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-family:"DM Sans",sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.si:focus{border-color:rgba(232,196,74,.4)}
.si::placeholder{color:var(--mu2)}
.si-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mu2);pointer-events:none}
.eplist{display:flex;flex-direction:column;gap:5px}
.epr{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);cursor:pointer;transition:all .15s;position:relative;overflow:hidden;user-select:none}
.epr::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ck);transform:scaleY(0);transition:transform .2s}
.epr.done::before{transform:scaleY(1)}
.epr:hover{border-color:rgba(232,196,74,.25)}
.epr.act{border-color:var(--ac);background:rgba(232,196,74,.05)}
.epr.done{opacity:.55}
.epr.done .epn{color:var(--ck)}
.epth{width:42px;height:42px;border-radius:8px;overflow:hidden;flex-shrink:0;position:relative;background:var(--sf2)}
.epth-c{position:absolute;inset:0;width:100%;height:100%}
.epth-i{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s}
.epth-i.on{opacity:1}
.epi{flex:1;min-width:0}
.epn{font-size:10px;color:var(--mu);letter-spacing:.1em;line-height:1}
.ept{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;line-height:1.3}
.epck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;color:transparent}
.epr.done .epck{background:var(--ck);border-color:var(--ck);color:#fff}
.ep-empty{text-align:center;padding:40px 20px;color:var(--mu);font-size:14px}
.fab{position:fixed;bottom:24px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--ac);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0a0810;box-shadow:0 4px 18px rgba(232,196,74,.38);transition:all .2s;z-index:90}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 26px rgba(232,196,74,.5)}
.ov{position:fixed;inset:0;background:rgba(8,8,16,.88);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .28s}
.ov.open{opacity:1;pointer-events:all}
.modal{width:100%;max-width:460px;background:var(--sf);border:1px solid var(--bd);border-top:1px solid rgba(232,196,74,.15);border-radius:22px 22px 0 0;padding:28px 22px 44px;transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1)}
.ov.open .modal{transform:translateY(0)}
.mpill{width:34px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 22px}
.mtitle{font-family:"Playfair Display",serif;font-size:20px;font-weight:700;margin-bottom:6px}
.mdesc{font-size:12px;color:var(--mu);line-height:1.65;margin-bottom:16px}
.mta{width:100%;min-height:110px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;color:var(--tx);font-family:"DM Sans",sans-serif;font-size:13px;resize:vertical;outline:none;transition:border-color .2s}
.mta:focus{border-color:rgba(232,196,74,.45)}
.mta::placeholder{color:var(--mu2)}
.mhint{font-size:11px;color:var(--mu2);margin:7px 0 18px}
.mbtns{display:flex;gap:8px}
.btn{flex:1;padding:13px;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .18s}
.btnp{background:var(--ac);color:#0a0810}
.btnp:hover{background:#d4b040}
.btns{background:var(--sf2);color:var(--mu);border:1px solid var(--bd)}
.btns:hover{color:var(--tx)}
.mdanger{margin-top:16px;text-align:center}
.btnd{background:transparent;border:none;color:#e05555;font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:"DM Sans",sans-serif;transition:background .15s}
.btnd:hover{background:rgba(224,85,85,.12)}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--sf2);border:1px solid var(--bd);border-radius:24px;padding:9px 18px;font-size:13px;color:var(--tx);opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:600px){.app{max-width:500px}}
@media(min-width:900px){body{padding:40px 20px}.app{max-width:540px;padding:0 0 100px}}
</style>
</head>
<body>
<div class="app">
<div class="hdr"><div class="hdr-die">Die</div><div class="hdr-qqq">???</div><div class="hdr-sub">Folgen-Tracker</div></div>
<div class="stats">
  <div class="stat"><div class="stat-n" id="sT">–</div><div class="stat-l">Gesamt</div></div>
  <div class="stat"><div class="stat-n" id="sW">–</div><div class="stat-l">Gehört</div></div>
  <div class="stat"><div class="stat-n" id="sL">–</div><div class="stat-l">Offen</div></div>
</div>
<div class="player">
  <div class="cvr">
    <canvas class="cvr-canvas" id="pCvs"></canvas>
    <img class="cvr-img" id="pImg" alt="" crossorigin="anonymous">
    <div class="cvr-ok" id="pOk">
      <svg viewBox="0 0 72 72" fill="none"><circle cx="36" cy="36" r="34" stroke="rgba(52,213,116,.5)" stroke-width="1.5"/><path d="M20 36L31 47L52 26" stroke="#34d574" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="badge" id="pBadge">–</div>
    <div class="spinner" id="pSpin"><div class="spin-ring"></div></div>
  </div>
  <div class="pbody">
    <div class="pnum" id="pNum">–</div>
    <div class="ptitle" id="pTitle">–</div>
    <div class="prog"><div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div><div class="prog-pct" id="progPct">0%</div></div>
    <div class="ctrl-row">
      <button class="ctrl" id="bPrev" onclick="nav(-1)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="check-btn" id="mCheck" onclick="toggleCur()"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
      <button class="ctrl" id="bNext" onclick="nav(1)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
  </div>
</div>
<div class="lhdr">
  <div class="ltitle">Alle Folgen</div>
  <div class="filters">
    <button class="fb on" onclick="setF('all',this)">Alle</button>
    <button class="fb" onclick="setF('open',this)">Offen</button>
    <button class="fb" onclick="setF('done',this)">Gehört</button>
  </div>
</div>
<div class="sw">
  <svg class="si-ic" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input class="si" id="srch" type="text" placeholder="Folge suchen…" oninput="renderList()">
</div>
<div class="eplist" id="epList"></div>
</div>

<button class="fab" onclick="openM()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>

<div class="ov" id="ov" onclick="handleOv(event)">
  <div class="modal">
    <div class="mpill"></div>
    <div class="mtitle">Schnell-Import</div>
    <div class="mdesc">Trag deine bereits gehörten Folgennummern ein – kommagetrennt oder zeilenweise. Bereiche wie <strong style="color:var(--ac)">1-50</strong> funktionieren auch.</div>
    <textarea class="mta" id="mTa" placeholder="z.B. 1-100, 115, 120-130&#10;oder:&#10;1&#10;2&#10;7"></textarea>
    <div class="mhint">💡 Tipp: „1-200" hakt alle ersten 200 Folgen ab.</div>
    <div class="mbtns"><button class="btn btns" onclick="closeM()">Abbrechen</button><button class="btn btnp" onclick="doImport()">Importieren</button></div>
    <div class="mdanger"><button class="btnd" onclick="resetAll()">Alle Häkchen entfernen</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

// ── BUILD EPISODE OBJECTS ───────────────────────────────────────────────
// EP_DATA: [[num, subtitle, coverUrl], ...]
// Display title = "Die drei ??? " + subtitle  (or just subtitle if starts with "und")
const episodes = EP_DATA.map(([num, sub, cover]) => ({
  num,
  title: sub,  // show just the subtitle for space (e.g. "und der Super-Papagei")
  cover: `https://dreimetadaten.de/data/Serie/${String(num).padStart(3, '0')}/cover.png`
}));

// ── STATE ───────────────────────────────────────────────────────────────
let checked = new Set();
let cur = 1;
let filt = "all";
let obs = null;

function loadState() {
  try {
    const c = localStorage.getItem("ddf4_c");
    if (c) checked = new Set(JSON.parse(c));
    const e = localStorage.getItem("ddf4_ep");
    if (e) cur = Math.max(1, Math.min(parseInt(e), episodes.length));
  } catch(e) {}
}
function save() {
  localStorage.setItem("ddf4_c", JSON.stringify([...checked]));
  localStorage.setItem("ddf4_ep", cur);
}

// ── CANVAS ──────────────────────────────────────────────────────────────
function draw(c, num, sz) {
  c.width = sz; c.height = sz;
  const x = c.getContext("2d");
  const bg = x.createLinearGradient(0,0,sz,sz);
  bg.addColorStop(0,"#0c0c1e"); bg.addColorStop(1,"#18101e");
  x.fillStyle = bg; x.fillRect(0,0,sz,sz);
  const gl = x.createRadialGradient(sz/2,sz*.38,0,sz/2,sz*.38,sz*.55);
  gl.addColorStop(0,"rgba(232,196,74,.13)"); gl.addColorStop(1,"transparent");
  x.fillStyle = gl; x.fillRect(0,0,sz,sz);
  const m = sz*.055;
  x.strokeStyle = "rgba(232,196,74,.25)"; x.lineWidth = sz>200?1.5:1;
  x.strokeRect(m,m,sz-m*2,sz-m*2);
  x.font = `900 ${sz*.36}px "Playfair Display",Georgia,serif`;
  x.textAlign = "center"; x.textBaseline = "middle";
  if(sz>100){x.shadowColor="rgba(232,196,74,.45)";x.shadowBlur=sz*.07}
  const g = x.createLinearGradient(0,sz*.2,0,sz*.65);
  g.addColorStop(0,"#f0d464"); g.addColorStop(1,"#c49030");
  x.fillStyle = g; x.fillText("???",sz/2,sz*.41); x.shadowBlur=0;
  if(sz>80){
    x.font=`400 ${sz*.075}px "DM Sans",sans-serif`;
    x.fillStyle="rgba(240,224,192,.55)";
    x.fillText("FOLGE "+String(num).padStart(3,"0"),sz/2,sz*.66);
  }
}

// ── STATS ───────────────────────────────────────────────────────────────
function updateStats() {
  const tot=episodes.length, done=checked.size;
  document.getElementById("sT").textContent=tot;
  document.getElementById("sW").textContent=done;
  document.getElementById("sL").textContent=tot-done;
  const pct=tot?Math.round(done/tot*100):0;
  document.getElementById("progFill").style.width=pct+"%";
  document.getElementById("progPct").textContent=pct+"%";
}

// ── PLAYER ──────────────────────────────────────────────────────────────
function updatePlayer() {
  const ep = episodes.find(e=>e.num===cur);
  if(!ep) return;
  const done = checked.has(cur);
  document.getElementById("pBadge").textContent="Folge "+String(ep.num).padStart(3,"0");
  document.getElementById("pNum").textContent="Folge "+String(ep.num).padStart(3,"0");
  document.getElementById("pTitle").textContent=ep.title;
  document.getElementById("mCheck").classList.toggle("on",done);
  document.getElementById("pOk").classList.toggle("on",done);
  const idx=episodes.findIndex(e=>e.num===cur);
  document.getElementById("bPrev").disabled=idx<=0;
  document.getElementById("bNext").disabled=idx>=episodes.length-1;
  loadCover(ep);
}

function loadCover(ep) {
  const cvs=document.getElementById("pCvs"),img=document.getElementById("pImg"),spin=document.getElementById("pSpin");
  const sz=Math.min((cvs.offsetWidth||460)*(window.devicePixelRatio||1),900);
  draw(cvs,ep.num,sz);
  img.classList.remove("on"); img.src="";
  if(ep.cover){
    spin.classList.add("on");
    const p=new Image(); p.crossOrigin="anonymous";
    p.onload=()=>{spin.classList.remove("on");if(p.naturalWidth>5){img.src=ep.cover;requestAnimationFrame(()=>img.classList.add("on"))}};
    p.onerror=()=>spin.classList.remove("on");
    p.src=ep.cover;
  }
}

function nav(d) {
  const idx=episodes.findIndex(e=>e.num===cur);
  const nxt=episodes[idx+d]; if(!nxt) return;
  cur=nxt.num; save(); updatePlayer();
  document.querySelectorAll(".epr").forEach(r=>r.classList.toggle("act",+r.dataset.n===cur));
}

function toggleCur() {
  if(checked.has(cur)) checked.delete(cur); else checked.add(cur);
  save(); updateStats();
  const done=checked.has(cur);
  document.getElementById("mCheck").classList.toggle("on",done);
  document.getElementById("pOk").classList.toggle("on",done);
  const row=document.querySelector(`.epr[data-n="${cur}"]`);
  if(row){if(filt!=="all") row.remove(); else syncRow(row,cur);}
}

function toggleEp(n) {
  if(checked.has(n)) checked.delete(n); else checked.add(n);
  save(); updateStats();
  if(n===cur){
    const done=checked.has(n);
    document.getElementById("mCheck").classList.toggle("on",done);
    document.getElementById("pOk").classList.toggle("on",done);
  }
  const row=document.querySelector(`.epr[data-n="${n}"]`);
  if(row){if(filt!=="all") row.remove(); else syncRow(row,n);}
}

function syncRow(row,n){
  const done=checked.has(n);
  row.classList.toggle("done",done);
}

// ── LIST ────────────────────────────────────────────────────────────────
function setupObs() {
  if(!("IntersectionObserver" in window)) return;
  obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting) return;
      const row=e.target, n=+row.dataset.n;
      const ep=episodes.find(x=>x.num===n);
      if(!ep?.cover) return;
      const img=row.querySelector(".epth-i");
      if(img.dataset.l) return;
      img.dataset.l="1";
      const p=new Image(); p.crossOrigin="anonymous";
      p.onload=()=>{if(p.naturalWidth>5){img.src=ep.cover;requestAnimationFrame(()=>img.classList.add("on"))}};
      p.src=ep.cover;
      obs.unobserve(row);
    });
  },{rootMargin:"150px"});
}

function renderList() {
  const list=document.getElementById("epList");
  const q=(document.getElementById("srch")?.value||"").toLowerCase().trim();
  const filtered=episodes.filter(ep=>{
    if(filt==="open"&&checked.has(ep.num)) return false;
    if(filt==="done"&&!checked.has(ep.num)) return false;
    if(q) return ep.title.toLowerCase().includes(q)||String(ep.num).includes(q);
    return true;
  });
  if(!filtered.length){list.innerHTML='<div class="ep-empty">Keine Folgen gefunden.</div>';return;}
  list.innerHTML="";
  filtered.forEach(ep=>{
    const done=checked.has(ep.num), act=ep.num===cur;
    const row=document.createElement("div");
    row.className=`epr${done?" done":""}${act?" act":""}`;
    row.dataset.n=ep.num;
    row.innerHTML=`<div class="epth"><canvas class="epth-c"></canvas><img class="epth-i" alt="" crossorigin="anonymous"></div><div class="epi"><div class="epn">FOLGE ${String(ep.num).padStart(3,"0")}</div><div class="ept">${esc(ep.title)}</div></div><div class="epck"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
    draw(row.querySelector(".epth-c"),ep.num,84);
    row.addEventListener("click",e=>{
      if(e.target.closest(".epck")) toggleEp(ep.num);
      else selEp(ep.num);
    });
    list.appendChild(row);
    if(obs) obs.observe(row);
  });
}

function selEp(n) {
  cur=n; save(); updatePlayer();
  document.querySelectorAll(".epr").forEach(r=>r.classList.toggle("act",+r.dataset.n===n));
  document.querySelector(".epr.act")?.scrollIntoView({block:"nearest",behavior:"smooth"});
}

function setF(f,btn){
  filt=f;
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  renderList();
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// ── MODAL ───────────────────────────────────────────────────────────────
function openM(){document.getElementById("ov").classList.add("open")}
function closeM(){document.getElementById("ov").classList.remove("open")}
function handleOv(e){if(e.target.id==="ov") closeM()}
function doImport(){
  const nums=parseNums(document.getElementById("mTa").value);
  if(!nums.length){toast("Keine gültigen Nummern gefunden.");return}
  const max=episodes[episodes.length-1]?.num||9999;
  let added=0;
  nums.forEach(n=>{if(n>=1&&n<=max){checked.add(n);added++}});
  save();updateStats();renderList();updatePlayer();closeM();
  document.getElementById("mTa").value="";
  toast(`✓ ${added} Folge${added!==1?"n":""} als gehört markiert`);
}
function parseNums(raw){
  const s=new Set();
  raw.split(/[,\n;]+/).forEach(p=>{
    p=p.trim();if(!p) return;
    const r=p.match(/^(\d+)\s*[-–]\s*(\d+)$/);
    if(r){const a=+r[1],b=+r[2];for(let i=Math.min(a,b);i<=Math.max(a,b);i++)s.add(i)}
    else{const n=parseInt(p);if(!isNaN(n))s.add(n)}
  });
  return[...s];
}
function resetAll(){
  if(!confirm("Alle Häkchen wirklich entfernen?")) return;
  checked.clear();save();updateStats();renderList();updatePlayer();closeM();toast("Alle Häkchen entfernt.");
}

// ── TOAST ───────────────────────────────────────────────────────────────
let tt;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  clearTimeout(tt);tt=setTimeout(()=>el.classList.remove("show"),3000);
}

// ── ALSO TRY LIVE DATA ──────────────────────────────────────────────────
// When opened from a real server (not file://), we refresh titles + covers
// from dreimetadaten.de for maximum accuracy
async function tryLiveUpdate() {
  if(location.protocol==="file:") return; // skip on local file
  try {
    const r=await fetch("https://dreimetadaten.de/data/Serie.json");
    if(!r.ok) return;
    const raw=await r.json();
    const arr=raw.serie||[];
    arr.forEach(ep=>{
      if(!ep||!Number.isInteger(ep.nummer)) return;
      const obj=episodes.find(e=>e.num===ep.nummer);
      if(!obj) return;
      obj.title=ep.titel||obj.title;
      obj.cover=`https://dreimetadaten.de/data/Serie/${String(ep.nummer).padStart(3, '0')}/cover.png`;
    });
    updatePlayer();renderList();
  } catch(e){}
}

// ── INIT ────────────────────────────────────────────────────────────────
loadState();
updateStats();
updatePlayer();
setupObs();
renderList();
tryLiveUpdate();
</script>
